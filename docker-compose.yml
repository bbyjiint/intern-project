services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: intern-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-intern_website}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intern-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intern-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-intern_website}?schema=public
      FILE_STORAGE_PROVIDER: ${FILE_STORAGE_PROVIDER:-local}
      LOCAL_UPLOAD_DIR: /app/uploads
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    volumes:
      # Mount backend source for live reload in development
      - ./backend:/app
      # Keep container node_modules isolated from host platform differences
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - intern-network
    # Ensure DB schema is in sync for local dev (new columns for bug reports, etc.)
    command: sh -c "npx prisma db push --accept-data-loss --config=./prisma.config.ts && npm run prisma:generate && npm run dev"

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: intern-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5001}
      # For development, Next.js needs to watch files
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      # Mount source code for hot reload (exclude node_modules for performance)
      - ./frontend-next:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - intern-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  intern-network:
    driver: bridge
