<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Database CRUD Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 2em; }
        .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            background: white; border: none; padding: 12px 20px; border-radius: 8px 8px 0 0;
            cursor: pointer; font-weight: 600; transition: all 0.3s;
        }
        .tab-btn.active { background: #4a5568; color: white; }
        .tab-content { display: none; background: white; border-radius: 10px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        input, select, textarea {
            width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px;
            font-size: 14px; transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            background: #667eea; color: black; border: none; padding: 12px 24px;
            border-radius: 5px; cursor: pointer; font-weight: 600; margin-right: 10px; margin-top: 10px;
        }
        button:hover { background: #5568d3; }
        button.danger { background: #e74c3c; }
        button.danger:hover { background: #c0392b; }
        button.secondary { background: #95a5a6; }
        .message {
            padding: 12px; border-radius: 5px; margin-bottom: 15px; display: none;
        }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .list-item {
            background: #f8f9fa; padding: 15px; margin-bottom: 10px; border-radius: 5px;
            border-left: 4px solid #667eea; display: flex; justify-content: space-between; align-items: center;
        }
        .item-info { flex: 1; }
        .item-info h3 { color: #333; margin-bottom: 5px; }
        .item-info p { color: #666; font-size: 14px; margin: 3px 0; }
        .item-actions { display: flex; gap: 10px; }
        .university-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .university-table th { background: #667eea; color: white; padding: 12px; text-align: left; font-weight: 600; }
        .university-table td { padding: 12px; border-bottom: 1px solid #ddd; }
        .university-table tr:hover { background: #f8f9fa; }
        .university-table tr:last-child td { border-bottom: none; }
        .university-table td.editable { cursor: pointer; position: relative; }
        .university-table td.editable:hover { background: #e3f2fd; }
        .university-table td.editing { padding: 0; }
        .university-table td.editing input { width: 100%; padding: 8px; border: 2px solid #667eea; border-radius: 3px; font-size: 14px; }
        .edit-actions { display: flex; gap: 5px; margin-top: 5px; }
        .edit-actions button { padding: 4px 12px; font-size: 12px; margin: 0; }
        @media (max-width: 768px) { 
            .form-row { grid-template-columns: 1fr; }
            .university-table { font-size: 12px; }
            .university-table th, .university-table td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗄️ Complete Database CRUD Test</h1>
        <div class="tabs" id="tabs"></div>
        <div id="tab-contents"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const tables = [
            { name: 'User', endpoint: 'users', fields: [
                { name: 'email', type: 'email', required: true },
                { name: 'password', type: 'password' },
                { name: 'role', type: 'select', options: ['CANDIDATE', 'COMPANY'], required: true },
                { name: 'authProvider', type: 'select', options: ['LOCAL', 'GOOGLE', 'LINE', 'FACEBOOK'] },
                { name: 'socialID', type: 'text', required: true },
                { name: 'lineUserID', type: 'text' }
            ]},
            { name: 'Skills', endpoint: 'skills', fields: [
                { name: 'name', type: 'text', required: true }
            ]},
            { name: 'CandidateProfile', endpoint: 'candidate-profiles', fields: [
                { name: 'userId', type: 'select', required: true, label: 'User (Select Candidate User)', options: [] },
                { name: 'studentCode', type: 'text', label: 'Student Code' },
                { name: 'fullName', type: 'text', label: 'Full Name' },
                { name: 'contactEmail', type: 'email', label: 'Contact Email' },
                { name: 'phoneNumber', type: 'text', label: 'Phone Number' },
                { name: 'desiredPosition', type: 'text', label: 'Desired Position' },
                { name: 'bio', type: 'textarea', label: 'Bio' },
                { name: 'major', type: 'text' },
                { name: 'studyYear', type: 'number', label: 'Study Year' }
            ]},
            { name: 'CandidateUniversity', endpoint: 'candidate-universities', fields: [
                { name: 'candidateId', type: 'select', required: true, label: 'Candidate Profile (Select by ID)', options: [] },
                { name: 'universityId', type: 'select', required: true, label: 'University', options: [] },
                { name: 'educationLevel', type: 'select', options: ['BACHELOR', 'MASTERS', 'PHD'], required: true },
                { name: 'degreeName', type: 'text', label: 'Degree Name' },
                { name: 'startDate', type: 'date' },
                { name: 'endDate', type: 'date' },
                { name: 'gpa', type: 'number', label: 'GPA' },
                { name: 'isCurrent', type: 'select', options: ['true', 'false'], label: 'Current Education' }
            ]},
            { name: 'CompanyProfile', endpoint: 'company-profiles', fields: [
                { name: 'userId', type: 'select', required: true, label: 'User (Select Company User)', options: [] },
                { name: 'companyName', type: 'text', required: true, label: 'Company Name' },
                { name: 'about', type: 'textarea' },
                { name: 'location', type: 'text' },
                { name: 'province', type: 'text' },
                { name: 'logoURL', type: 'url', label: 'Logo URL' },
                { name: 'recruiterName', type: 'text', label: 'Recruiter Name' },
                { name: 'recruiterPosition', type: 'text', label: 'Recruiter Position' },
                { name: 'registrationNum', type: 'text', label: 'Registration Number' }
            ]},
            { name: 'WorkHistory', endpoint: 'work-histories', fields: [
                { name: 'candidateId', type: 'select', required: true, label: 'Candidate Profile', options: [] },
                { name: 'companyName', type: 'text', required: true, label: 'Company Name' },
                { name: 'position', type: 'text', required: true },
                { name: 'startDate', type: 'date', label: 'Start Date' },
                { name: 'endDate', type: 'date', label: 'End Date' },
                { name: 'description', type: 'textarea' }
            ]},
            { name: 'CertificateFile', endpoint: 'certificate-files', fields: [
                { name: 'candidateId', type: 'select', required: true, label: 'Candidate Profile', options: [] },
                { name: 'name', type: 'text', required: true },
                { name: 'url', type: 'url', required: true, label: 'URL' },
                { name: 'type', type: 'text' },
                { name: 'description', type: 'textarea' }
            ]},
            { name: 'CandidateContactFile', endpoint: 'candidate-contact-files', fields: [
                { name: 'candidateId', type: 'select', required: true, label: 'Candidate Profile', options: [] },
                { name: 'name', type: 'text', required: true },
                { name: 'url', type: 'url', required: true, label: 'URL' },
                { name: 'type', type: 'select', options: ['RESUME', 'PORTFOLIO', 'OTHER'], label: 'File Type' }
            ]},
            { name: 'CompanyEmail', endpoint: 'company-emails', fields: [
                { name: 'companyId', type: 'select', required: true, label: 'Company Profile', options: [] },
                { name: 'email', type: 'email', required: true }
            ]},
            { name: 'CompanyPhone', endpoint: 'company-phones', fields: [
                { name: 'companyId', type: 'select', required: true, label: 'Company Profile', options: [] },
                { name: 'phone', type: 'text', required: true }
            ]},
            { name: 'UserSkill', endpoint: 'user-skills', fields: [
                { name: 'candidateId', type: 'select', required: true, label: 'Candidate Profile', options: [] },
                { name: 'skillId', type: 'select', required: true, label: 'Skill', options: [] },
                { name: 'rating', type: 'number', min: 1, max: 10 }
            ]}
        ];

        let currentTable = null;
        let editingId = null;

        async function refreshDropdowns() {
            try {
                // Fetch users for the userId dropdowns
                const usersRes = await fetch(`${API_URL}/users`);
                const users = await usersRes.json();
                
                // Fetch universities for the universityId dropdowns
                const unisRes = await fetch(`${API_URL}/universities`);
                const unis = await unisRes.json();

                // Fetch candidate profiles for linking education
                const profilesRes = await fetch(`${API_URL}/candidate-profiles`);
                const profiles = await profilesRes.json();

                // Fetch skills for UserSkill dropdown
                const skillsRes = await fetch(`${API_URL}/skills`);
                const skills = await skillsRes.json();

                // Helper to populate select
                const populateSelect = (selectId, options) => {
                    const select = document.getElementById(selectId);
                    if (!select) return;
                    const currentValue = select.value;
                    select.innerHTML = '<option value="">Select...</option>' + 
                        options.map(opt => `<option value="${opt.value}">${opt.label}</option>`).join('');
                    select.value = currentValue;
                };

                // Helper to get candidate display label
                const getCandidateLabel = (p) => `${p.fullName || 'No Name'} (${p.User?.email || p.userId.substring(0,8)})`;
                const getCompanyLabel = (p) => `${p.companyName || 'No Name'} (${p.User?.email || p.userId.substring(0,8)})`;

                // Populate CandidateProfile userId (only CANDIDATE role)
                populateSelect('CandidateProfile-userId', users
                    .filter(u => u.role === 'CANDIDATE')
                    .map(u => ({ value: u.id, label: `${u.email} (${u.role})` }))
                );

                // Populate CandidateUniversity dropdowns
                populateSelect('CandidateUniversity-candidateId', profiles
                    .map(p => ({ value: p.id, label: getCandidateLabel(p) }))
                );
                populateSelect('CandidateUniversity-universityId', unis
                    .map(u => ({ value: u.id, label: u.name }))
                );

                // Populate CompanyProfile userId (only COMPANY role)
                populateSelect('CompanyProfile-userId', users
                    .filter(u => u.role === 'COMPANY')
                    .map(u => ({ value: u.id, label: `${u.email} (${u.role})` }))
                );

                // Populate related tables with correct PROFILE IDs (not User IDs)
                const candidateOptions = profiles.map(p => ({ value: p.id, label: getCandidateLabel(p) }));
                
                populateSelect('WorkHistory-candidateId', candidateOptions);
                populateSelect('CertificateFile-candidateId', candidateOptions);
                populateSelect('CandidateContactFile-candidateId', candidateOptions);
                populateSelect('UserSkill-candidateId', candidateOptions);
                populateSelect('UserSkill-skillId', skills.map(s => ({ value: s.id, label: s.name })));

                // Populate company relations
                const companyProfilesRes = await fetch(`${API_URL}/company-profiles`);
                const companyProfiles = await companyProfilesRes.json();
                const companyOptions = companyProfiles.map(p => ({ value: p.id, label: getCompanyLabel(p) }));
                
                populateSelect('CompanyEmail-companyId', companyOptions);
                populateSelect('CompanyPhone-companyId', companyOptions);

            } catch (err) {
                console.error('Error refreshing dropdowns:', err);
            }
        }

        function loadUniversityList() {
            fetch(`${API_URL}/universities`)
                .then(res => res.json())
                .then(data => {
                    const listEl = document.getElementById('university-list-view');
                    if (data.length === 0) {
                        listEl.innerHTML = '<p>No universities found.</p>';
                        return;
                    }
                    listEl.innerHTML = `
                        <table class="university-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Thai Name</th>
                                    <th>Code</th>
                                    <th>Province</th>
                                    <th>Country</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(uni => `
                                    <tr>
                                        <td><strong>${uni.name || '-'}</strong></td>
                                        <td>${uni.thname || '-'}</td>
                                        <td>${uni.code || '-'}</td>
                                        <td>${uni.province || '-'}</td>
                                        <td>${uni.country || '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <p style="margin-top: 15px; color: #666;">Total: ${data.length} universities</p>
                    `;
                })
                .catch(err => {
                    document.getElementById('university-list-view').innerHTML = 
                        `<p style="color: red;">Error loading universities: ${err.message}</p>`;
                });
        }

        function loadSkillList() {
            fetch(`${API_URL}/skills`)
                .then(res => res.json())
                .then(data => {
                    const listEl = document.getElementById('skill-list-view');
                    if (data.length === 0) {
                        listEl.innerHTML = '<p>No skills found.</p>';
                        return;
                    }
                    listEl.innerHTML = `
                        <table class="university-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Created At</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(skill => `
                                    <tr>
                                        <td><strong>${skill.name || '-'}</strong></td>
                                        <td>${new Date(skill.createdAt).toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <p style="margin-top: 15px; color: #666;">Total: ${data.length} skills</p>
                    `;
                })
                .catch(err => {
                    document.getElementById('skill-list-view').innerHTML = 
                        `<p style="color: red;">Error loading skills: ${err.message}</p>`;
                });
        }

        function showMessage(text, type = 'success', tableName, details = '') {
            const msgEl = document.getElementById(`message-${tableName}`);
            msgEl.innerHTML = `<strong>${text}</strong>${details ? '<br><small>' + details + '</small>' : ''}`;
            msgEl.className = `message ${type}`;
            msgEl.style.display = 'block';
            setTimeout(() => { msgEl.style.display = 'none'; }, 8000);
        }

        function switchTab(tableName) {
            currentTable = tableName;
            editingId = null;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`tab-${tableName}`).classList.add('active');
            document.querySelector(`[data-table="${tableName}"]`).classList.add('active');
            
            // Refresh dropdowns if switching to a profile or related table
            if (['CandidateProfile', 'CompanyProfile', 'WorkHistory', 'CertificateFile', 'UserSkill'].includes(tableName)) {
                refreshDropdowns();
            }
            
            loadTable(tableName);
        }

        function loadTable(tableName) {
            const table = tables.find(t => t.name === tableName);
            fetch(`${API_URL}/${table.endpoint}`)
                .then(res => res.json())
                .then(data => {
                    const listEl = document.getElementById(`list-${tableName}`);
                    if (data.length === 0) {
                        listEl.innerHTML = '<p>No records found. Create one above!</p>';
                        return;
                    }
                    listEl.innerHTML = data.map(item => {
                        const fields = Object.keys(item).filter(k => !['id', 'createdAt', 'updatedAt'].includes(k)).slice(0, 5);
                        return `<div class="list-item">
                            <div class="item-info">
                                <h3>${item.id.substring(0, 8)}...</h3>
                                ${fields.map(f => item[f] ? `<p><strong>${f}:</strong> ${String(item[f]).substring(0, 50)}</p>` : '').join('')}
                            </div>
                            <div class="item-actions">
                                <button onclick="editItem('${tableName}', '${item.id}')">✏️ Edit</button>
                                <button onclick="deleteItem('${tableName}', '${item.id}')" class="danger">🗑️ Delete</button>
                            </div>
                        </div>`;
                    }).join('');
                })
                .catch(err => {
                    showMessage('Error loading data', 'error', tableName, err.message);
                    document.getElementById(`list-${tableName}`).innerHTML = '<p>Error loading data</p>';
                });
        }

        function editItem(tableName, id) {
            const table = tables.find(t => t.name === tableName);
            fetch(`${API_URL}/${table.endpoint}/${id}`)
                .then(res => res.json())
                .then(data => {
                    editingId = id;
                    table.fields.forEach(field => {
                        const el = document.getElementById(`${tableName}-${field.name}`);
                        if (el) el.value = data[field.name] || '';
                    });
                    document.getElementById(`submit-${tableName}`).textContent = 'Update';
                    document.getElementById(`cancel-${tableName}`).style.display = 'inline-block';
                })
                .catch(err => showMessage('Error loading record', 'error', tableName, err.message));
        }

        function deleteItem(tableName, id) {
            if (!confirm('Delete this record?')) return;
            const table = tables.find(t => t.name === tableName);
            fetch(`${API_URL}/${table.endpoint}/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(async res => {
                    const result = await res.json();
                    if (res.ok) {
                        showMessage('Deleted successfully!', 'success', tableName);
                        loadTable(tableName);
                    } else {
                        showMessage(result.error || 'Error deleting', 'error', tableName, result.details || '');
                    }
                })
                .catch(err => showMessage('Error deleting', 'error', tableName, err.message));
        }

        function resetForm(tableName) {
            const table = tables.find(t => t.name === tableName);
            table.fields.forEach(field => {
                const el = document.getElementById(`${tableName}-${field.name}`);
                if (el) el.value = '';
            });
            editingId = null;
            document.getElementById(`submit-${tableName}`).textContent = 'Create';
            document.getElementById(`cancel-${tableName}`).style.display = 'none';
        }

        function submitForm(tableName) {
            const table = tables.find(t => t.name === tableName);
            const data = {};
            let hasError = false;
            
            table.fields.forEach(field => {
                const el = document.getElementById(`${tableName}-${field.name}`);
                if (el && el.value) {
                    if (field.type === 'number') {
                        const num = parseInt(el.value);
                        if (!isNaN(num)) data[field.name] = num;
                    } else if (field.type === 'date') {
                        const date = new Date(el.value);
                        if (!isNaN(date.getTime())) data[field.name] = date.toISOString();
                    } else {
                        data[field.name] = el.value;
                    }
                } else if (field.required) {
                    showMessage(`Field ${field.label || field.name} is required`, 'error', tableName);
                    hasError = true;
                }
            });
            
            if (hasError) return;

            const url = editingId ? `${API_URL}/${table.endpoint}/${editingId}` : `${API_URL}/${table.endpoint}`;
            const method = editingId ? 'PUT' : 'POST';

            fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(async res => {
                const result = await res.json();
                if (res.ok) {
                    showMessage(editingId ? 'Updated!' : 'Created!', 'success', tableName);
                    resetForm(tableName);
                    loadTable(tableName);
                } else {
                    showMessage(result.error || 'Error', 'error', tableName, result.details || result.message || '');
                }
            })
            .catch(err => showMessage('Error: ' + err.message, 'error', tableName, err.toString()));
        }

        // Initialize UI
        const tabsEl = document.getElementById('tabs');
        const contentsEl = document.getElementById('tab-contents');
        
        // Add University List tab first
        const listBtn = document.createElement('button');
        listBtn.className = 'tab-btn active';
        listBtn.textContent = '📋 University List';
        listBtn.setAttribute('data-table', 'UniversityList');
        listBtn.onclick = () => {
            currentTable = 'UniversityList';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            listBtn.classList.add('active');
            document.getElementById('tab-UniversityList').classList.add('active');
            loadUniversityList();
        };
        tabsEl.appendChild(listBtn);

        const listContent = document.createElement('div');
        listContent.id = 'tab-UniversityList';
        listContent.className = 'tab-content active';
        listContent.innerHTML = `
            <h2>📋 University List</h2>
            <div id="message-UniversityList" class="message"></div>
            <button onclick="loadUniversityList()" class="secondary" style="margin-bottom: 20px;">🔄 Refresh</button>
            <div id="university-list-view">Loading...</div>
        `;
        contentsEl.appendChild(listContent);

        // Add Skill List tab
        const skillListBtn = document.createElement('button');
        skillListBtn.className = 'tab-btn';
        skillListBtn.textContent = '🛠️ Skill List';
        skillListBtn.setAttribute('data-table', 'SkillList');
        skillListBtn.onclick = () => {
            currentTable = 'SkillList';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            skillListBtn.classList.add('active');
            document.getElementById('tab-SkillList').classList.add('active');
            loadSkillList();
        };
        tabsEl.appendChild(skillListBtn);

        const skillListContent = document.createElement('div');
        skillListContent.id = 'tab-SkillList';
        skillListContent.className = 'tab-content';
        skillListContent.innerHTML = `
            <h2>🛠️ Skill List</h2>
            <div id="message-SkillList" class="message"></div>
            <button onclick="loadSkillList()" class="secondary" style="margin-bottom: 20px;">🔄 Refresh</button>
            <div id="skill-list-view">Loading...</div>
        `;
        contentsEl.appendChild(skillListContent);
        
        tables.forEach((table, idx) => {
            // Tab button
            const btn = document.createElement('button');
            btn.className = `tab-btn`;
            btn.textContent = table.name;
            btn.setAttribute('data-table', table.name);
            btn.onclick = () => switchTab(table.name);
            tabsEl.appendChild(btn);

            // Tab content
            const content = document.createElement('div');
            content.id = `tab-${table.name}`;
            content.className = `tab-content`;
            content.innerHTML = `
                <h2>${table.name} CRUD</h2>
                <div id="message-${table.name}" class="message"></div>
                <form onsubmit="event.preventDefault(); submitForm('${table.name}')">
                    ${table.fields.map(field => `
                        <div class="form-group">
                            <label>${field.label || field.name}${field.required ? ' *' : ''}</label>
                            ${field.type === 'select' ? `
                                <select id="${table.name}-${field.name}" ${field.required ? 'required' : ''}>
                                    <option value="">Select...</option>
                                    ${field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                                </select>
                            ` : field.type === 'textarea' ? `
                                <textarea id="${table.name}-${field.name}" rows="3" ${field.required ? 'required' : ''}></textarea>
                            ` : `
                                <input type="${field.type}" id="${table.name}-${field.name}" 
                                    ${field.required ? 'required' : ''} 
                                    ${field.min ? `min="${field.min}"` : ''} 
                                    ${field.max ? `max="${field.max}"` : ''} />
                            `}
                        </div>
                    `).join('')}
                    <button type="submit" id="submit-${table.name}">Create</button>
                    <button type="button" id="cancel-${table.name}" onclick="resetForm('${table.name}')" style="display:none;" class="secondary">Cancel</button>
                    <button type="button" onclick="loadTable('${table.name}')" class="secondary">🔄 Refresh</button>
                </form>
                <h3 style="margin-top: 30px;">Records</h3>
                <div id="list-${table.name}">Loading...</div>
            `;
            contentsEl.appendChild(content);
        });

        // Load university list by default
        currentTable = 'UniversityList';
